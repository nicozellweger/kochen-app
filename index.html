<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nicos Küche</title>

<!-- PWA Meta -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f59e0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nicos Küche">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">

<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #110d0a;
  --bg-elevated: #1c1512;
  --card: rgba(255, 120, 50, 0.05);
  --card-hover: rgba(255, 120, 50, 0.1);
  --text: #f5ebe0;
  --text-mid: #c4a882;
  --text-light: #7a6350;
  --accent: #ff6b35;
  --accent2: #ff9f1c;
  --accent-glow: rgba(255, 107, 53, 0.25);
  --accent-hover: #ff8555;
  --green: #4ade80;
  --green-glow: rgba(74, 222, 128, 0.12);
  --border: rgba(255, 150, 80, 0.08);
  --border-light: rgba(255, 150, 80, 0.15);
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
  --radius: 16px;
  --radius-sm: 10px;
  --tag-bg: rgba(255, 107, 53, 0.08);
  --glass: rgba(255, 120, 50, 0.03);
  --glass-border: rgba(255, 150, 80, 0.12);
  --glass-bg: rgba(35, 25, 20, 0.65);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  max-width: 600px;
  margin: 0 auto;
  padding-bottom: 2rem;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* Gradient Mesh Background */
body::before {
  content: '';
  position: fixed;
  top: -20%; left: -20%;
  width: 60%; height: 50%;
  background: radial-gradient(ellipse, rgba(255, 107, 53, 0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: meshFloat1 20s ease-in-out infinite;
}

body::after {
  content: '';
  position: fixed;
  bottom: -10%; right: -20%;
  width: 50%; height: 45%;
  background: radial-gradient(ellipse, rgba(255, 159, 28, 0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: meshFloat2 25s ease-in-out infinite;
}

@keyframes meshFloat1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(10%, 5%) scale(1.1); }
  66% { transform: translate(-5%, -3%) scale(0.95); }
}

@keyframes meshFloat2 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(-8%, -5%) scale(1.08); }
}

#app { position: relative; z-index: 1; }

header {
  position: sticky;
  top: 0;
  background: rgba(17, 13, 10, 0.75);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  z-index: 100;
  padding: 1rem 1rem 0;
  border-bottom: 1px solid var(--glass-border);
}

h1 {
  font-size: 1.3rem;
  font-weight: 700;
  text-align: center;
  margin-bottom: 0.75rem;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.search-bar { margin-bottom: 0.75rem; }

.search-bar input {
  width: 100%;
  padding: 0.65rem 1.1rem;
  border: 1px solid var(--glass-border);
  border-radius: 99px;
  font-size: 0.9rem;
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text);
  outline: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.search-bar input::placeholder { color: var(--text-light); }
.search-bar input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow), 0 0 20px rgba(255, 107, 53, 0.1);
  background: rgba(28, 21, 18, 0.8);
}

.tabs {
  display: flex;
  gap: 0;
}

.tab {
  flex: 1;
  padding: 0.65rem;
  border: none;
  background: none;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-light);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.25s ease;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.filters {
  padding: 0.75rem 1rem;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }

.filter-row {
  display: flex;
  gap: 0.4rem;
  white-space: nowrap;
}

.filter-btn {
  padding: 0.35rem 0.8rem;
  border: 1px solid var(--glass-border);
  border-radius: 99px;
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--text-mid);
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  flex-shrink: 0;
}

.filter-btn:active { transform: scale(0.92); }

.filter-btn.active {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  border-color: transparent;
  box-shadow: 0 4px 16px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.15);
}

.view { padding: 0 1rem; }
.hidden { display: none !important; }

/* Cards */
.card-grid {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  padding-top: 0.5rem;
}

.card {
  background: var(--glass-bg);
  backdrop-filter: blur(16px) saturate(1.3);
  -webkit-backdrop-filter: blur(16px) saturate(1.3);
  border-radius: var(--radius);
  padding: 1rem 1rem 0.85rem;
  border: 1px solid var(--glass-border);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}

.card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(255,107,53,0.03) 0%, transparent 50%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}

.card:active {
  transform: scale(0.97);
  border-color: rgba(255, 150, 80, 0.25);
}
.card:active::before { opacity: 1; }
.card:active::after { opacity: 1; }

.card-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.3rem;
  letter-spacing: -0.01em;
  padding-right: 1.5rem;
}

.card-meta {
  display: flex;
  gap: 0.5rem;
  font-size: 0.75rem;
  color: var(--text-light);
  margin-bottom: 0.5rem;
}

.card-meta span {
  display: inline-flex;
  align-items: center;
}

.card-meta span::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--text-light);
  margin-right: 0.5rem;
}

.card-meta span:first-child::before { display: none; }

.card-tags {
  display: flex;
  gap: 0.3rem;
  flex-wrap: wrap;
}

.tag {
  background: rgba(255, 107, 53, 0.06);
  border: 1px solid rgba(255, 150, 80, 0.1);
  padding: 0.2rem 0.55rem;
  border-radius: 6px;
  font-size: 0.65rem;
  color: var(--text-mid);
  font-weight: 500;
  letter-spacing: 0.02em;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.star {
  position: absolute;
  top: 0.85rem;
  right: 0.85rem;
  font-size: 0.9rem;
  color: var(--accent);
  filter: drop-shadow(0 0 6px rgba(255, 107, 53, 0.5));
  animation: starPulse 3s ease-in-out infinite;
}

@keyframes starPulse {
  0%, 100% { filter: drop-shadow(0 0 4px rgba(255,107,53,0.4)); transform: scale(1); }
  50% { filter: drop-shadow(0 0 10px rgba(255,107,53,0.7)); transform: scale(1.1); }
}

/* Detail View */
#detail-content {
  padding-top: 0.5rem;
}

.detail-back {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  color: var(--accent);
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  margin-bottom: 1rem;
  border: none;
  background: none;
  transition: opacity 0.2s;
}

.detail-back:active { opacity: 0.7; }

.detail-title {
  font-size: 1.35rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  letter-spacing: -0.02em;
  line-height: 1.3;
}

.detail-meta {
  display: flex;
  gap: 0.75rem;
  font-size: 0.8rem;
  color: var(--text-light);
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}

.detail-meta span {
  background: rgba(255, 107, 53, 0.06);
  border: 1px solid rgba(255, 150, 80, 0.1);
  padding: 0.25rem 0.6rem;
  border-radius: 6px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.portionen-control {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 1.25rem;
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: 0.6rem 0.85rem;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  border: 1px solid var(--glass-border);
}

.portionen-control button {
  width: 2.2rem;
  height: 2.2rem;
  border-radius: 50%;
  border: 1px solid var(--glass-border);
  background: rgba(255, 107, 53, 0.08);
  color: var(--text);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.portionen-control button:active {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-color: transparent;
  color: white;
  box-shadow: 0 0 16px var(--accent-glow);
  transform: scale(0.9);
}

.portionen-control span {
  font-weight: 700;
  min-width: 1.5rem;
  text-align: center;
}

.section-title {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin: 1.5rem 0 0.6rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--glass-border);
}

.zutat-gruppe { margin-bottom: 0.5rem; }

.zutat-gruppe-name {
  font-weight: 600;
  font-size: 0.8rem;
  color: var(--text-mid);
  margin-bottom: 0.2rem;
  margin-top: 0.5rem;
}

.zutat-item {
  display: flex;
  justify-content: space-between;
  padding: 0.4rem 0;
  font-size: 0.88rem;
  border-bottom: 1px solid var(--border);
}

.zutat-menge {
  color: var(--accent);
  font-weight: 600;
  white-space: nowrap;
  margin-left: 0.5rem;
  font-variant-numeric: tabular-nums;
}

.schritt {
  display: flex;
  gap: 0.75rem;
  margin-bottom: 0.85rem;
  font-size: 0.88rem;
  color: var(--text-mid);
}

.schritt-num {
  flex-shrink: 0;
  width: 1.6rem;
  height: 1.6rem;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  margin-top: 0.15rem;
  box-shadow: 0 2px 12px var(--accent-glow);
}

.tipp {
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-left: 2px solid var(--accent);
  padding: 0.6rem 0.85rem;
  margin-bottom: 0.5rem;
  font-size: 0.82rem;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  color: var(--text-mid);
  border-top: 1px solid var(--glass-border);
  border-right: 1px solid var(--glass-border);
  border-bottom: 1px solid var(--glass-border);
}

.btn {
  padding: 0.65rem 1.3rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--text);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
}

.btn:active { transform: scale(0.95); }

.btn.primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  border-color: transparent;
  box-shadow: 0 4px 20px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.15);
}

.btn.primary:active {
  box-shadow: 0 2px 10px var(--accent-glow);
  transform: scale(0.95);
}

.detail-actions {
  display: flex;
  gap: 0.5rem;
  margin: 1.25rem 0;
  flex-wrap: wrap;
}

/* Einkaufsliste */
.einkauf-header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin: 0.75rem 0 1rem;
}

.einkauf-header h2 {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: -0.01em;
}

.badge {
  background: var(--accent);
  color: white;
  font-size: 0.7rem;
  padding: 0.15rem 0.55rem;
  border-radius: 99px;
  font-weight: 700;
  box-shadow: 0 2px 8px var(--accent-glow);
}

#einkauf-selected {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-bottom: 1rem;
}

.selected-chip {
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--glass-border);
  padding: 0.3rem 0.65rem;
  border-radius: 99px;
  font-size: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  color: var(--text-mid);
}

.selected-chip .remove {
  cursor: pointer;
  color: var(--accent);
  font-weight: 700;
  font-size: 0.9rem;
  line-height: 1;
}

.abteilung-group {
  margin-bottom: 1.25rem;
}

.abteilung-title {
  font-weight: 700;
  font-size: 0.7rem;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.4rem;
  padding-bottom: 0.3rem;
  border-bottom: 1px solid var(--glass-border);
}

.einkauf-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 0;
  font-size: 0.88rem;
  transition: opacity 0.2s;
}

.einkauf-item input[type="checkbox"] {
  width: 1.25rem;
  height: 1.25rem;
  accent-color: var(--green);
  border-radius: 4px;
}

.einkauf-item.checked {
  text-decoration: line-through;
  color: var(--text-light);
  opacity: 0.5;
}

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-light);
}

/* Menuplaner */
.menu-options {
  margin: 1rem 0;
  display: flex;
  gap: 1rem;
  align-items: center;
}

.menu-options label {
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--text-mid);
}

.menu-options input {
  width: 3.5rem;
  padding: 0.45rem;
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  font-size: 0.9rem;
  text-align: center;
  background: var(--glass-bg);
  color: var(--text);
}

.menu-options input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.menu-gang {
  margin: 0.75rem 0;
  background: rgba(40, 28, 20, 0.7);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: var(--radius);
  padding: 1rem;
  border: 1px solid rgba(255, 150, 80, 0.18);
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.menu-gang:active {
  transform: scale(0.97);
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow);
}

.menu-gang-title {
  font-size: 0.65rem;
  text-transform: uppercase;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 700;
  letter-spacing: 0.1em;
  margin-bottom: 0.2rem;
}

.menu-gang-name {
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.notiz-box {
  background: var(--glass-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 0.75rem;
  font-size: 0.82rem;
  margin-top: 1rem;
  font-style: italic;
  color: var(--text-light);
}

/* View Transitions */
.view {
  padding: 0 1rem;
  animation: viewFadeIn 0.3s ease-out;
}

@keyframes viewFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.card {
  animation: cardSlideIn 0.4s ease-out backwards;
}

.card:nth-child(1) { animation-delay: 0.03s; }
.card:nth-child(2) { animation-delay: 0.06s; }
.card:nth-child(3) { animation-delay: 0.09s; }
.card:nth-child(4) { animation-delay: 0.12s; }
.card:nth-child(5) { animation-delay: 0.15s; }
.card:nth-child(6) { animation-delay: 0.18s; }
.card:nth-child(7) { animation-delay: 0.21s; }
.card:nth-child(8) { animation-delay: 0.24s; }
.card:nth-child(9) { animation-delay: 0.27s; }
.card:nth-child(10) { animation-delay: 0.3s; }

@keyframes cardSlideIn {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Print */
@media print {
  :root {
    --bg: white;
    --card: white;
    --glass-bg: white;
    --text: black;
    --text-mid: #333;
    --text-light: #666;
    --accent: #d4622b;
    --accent2: #e07038;
    --border: #ddd;
    --glass-border: #ddd;
  }
  body::before, body::after { display: none; }
  header, .filters, .tabs, .btn, .detail-actions, .portionen-control button { display: none; }
  body { max-width: 100%; background: white; }
  .card { border: 1px solid #ddd; backdrop-filter: none; }
}

</style>
</head>
<body>

<div id="app">
  <header>
    <h1>Nicos K&uuml;che</h1>
    <div class="search-bar">
      <input type="search" id="search" placeholder="Suche (Name, Zutat, Tag...)" autocomplete="off">
    </div>
    <nav class="tabs">
      <button class="tab active" data-view="rezepte">Rezepte</button>
      <button class="tab" data-view="einkauf">Einkaufsliste</button>
      <button class="tab" data-view="menu">Men&uuml;planer</button>
    </nav>
  </header>

  <div class="filters">
    <div class="filter-row">
      <button class="filter-btn active" data-filter="alle">Alle</button>
      <button class="filter-btn" data-filter="favorit">&#9733; Favoriten</button>
      <button class="filter-btn" data-filter="Vorspeise">&#127869; Vorspeise</button>
      <button class="filter-btn" data-filter="Hauptgang">&#127860; Hauptgang</button>
      <button class="filter-btn" data-filter="Beilage">&#129388; Beilage</button>
      <button class="filter-btn" data-filter="Dessert">&#127856; Dessert</button>
      <button class="filter-btn" data-filter="Brot & Geb&auml;ck">&#127838; Brot</button>
      <button class="filter-btn" data-filter="Sauce & Dip">&#129379; Saucen</button>
      <button class="filter-btn" data-filter="Ap&eacute;ro">&#127863; Ap&eacute;ro</button>
      <button class="filter-btn" data-filter="Grundrezept">&#128218; Grundrezept</button>
    </div>
  </div>

  <!-- Rezepte View -->
