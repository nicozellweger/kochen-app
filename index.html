<script>
const REZEPTE = [{"id":"entrecote-reverse-sear","titel":"Argentine Entrecôte — Reverse Sear","kategorie":"Hauptgang","tags":["grill","fleisch","argentinisch","reverse-sear","steak"],"favorit":true,"portionen":2,"portionenEinheit":"Steaks","aufwand":"mittel","zeit":{"vorbereitung":10,"gesamt":60},"zutaten":[{"gruppe":"Steak","items":[{"menge":2,"einheit":"Stück","name":"Entrecôte (ca. 300g, 3cm dick)","abteilung":"Fleisch & Fisch"},{"menge":1,"einheit":"EL","name":"Olivenöl","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"TL","name":"Grobes Meersalz","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"TL","name":"Schwarzer Pfeffer (grob)","abteilung":"Gewürze & Öle"}]},{"gruppe":"Optional: Chimichurri","items":[{"menge":1,"einheit":"Bund","name":"Glattblättrige Petersilie","abteilung":"Gemüse & Früchte"},{"menge":4,"einheit":"Stück","name":"Knoblauchzehen","abteilung":"Gemüse & Früchte"},{"menge":1,"einheit":"TL","name":"Chiliflocken","abteilung":"Gewürze & Öle"},{"menge":3,"einheit":"EL","name":"Rotweinessig","abteilung":"Gewürze & Öle"},{"menge":100,"einheit":"ml","name":"Olivenöl","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"TL","name":"Oregano (getrocknet)","abteilung":"Gewürze & Öle"}]}],"schritte":["Steaks 1 Stunde vor dem Grillieren aus dem Kühlschrank nehmen — Raumtemperatur ist Pflicht für gleichmässiges Garen.","Outdoorchef einrichten: Indirekte Zone auf 120°C vorheizen, Sear Burner für später bereithalten (auf Maximum vorheizen ca. 5 Min. vor dem Searen).","Steaks trocken tupfen, mit Olivenöl dünn einreiben. Typhur-Sonden je in die dickste Stelle stecken — Spitze mittig.","Steaks auf die indirekte Zone legen, Deckel schliessen.","Langsam garen bis Kerntemperatur 48-50°C (Medium Rare) — ca. 30-40 Min. Sonde meldet, kein Aufmachen nötig.","Steaks vom Grill nehmen, kurz auf einem Brett ablegen. Sear Burner auf Maximum hochfahren.","Steaks auf den Sear Burner: 60-90 Sek. pro Seite, NICHT bewegen während des Seariens. Fertig wenn tiefbraune, krustige Maillard-Schicht — Rauch und Zischen sind erwünscht.","Vom Grill nehmen, mit grobem Meersalz und frisch gemahlenem schwarzen Pfeffer würzen (Pfeffer erst jetzt — verbrennt sonst beim Sear).","5 Min. ruhen lassen, dann gegen die Faser aufschneiden und servieren.","Optional Chimichurri: Petersilie, Knoblauch und Oregano von Hand mit dem Messer fein hacken (Mixer macht's matschig). Mit Chiliflocken, Rotweinessig, Olivenöl und Salz vermischen, mind. 30 Min. ziehen lassen — Farbe wird intensiver, Schärfe runder."],"tipps":["Reverse Sear = gleichmässiges Rosa von Rand zu Rand, perfekte Kruste.","Kerntemperatur beim Searing steigt nochmal 2-3°C — also rechtzeitig von der indirekten Zone nehmen.","Sear Burner muss wirklich auf Maximum sein. Rauch ist normal und gewünscht.","Typhur-Sonden machen das Rätselraten überflüssig."],"notizen":"Signature-Gericht auf dem Outdoorchef. Funktioniert auch mit Rindsfilet, dann kürzere Garzeiten."},{"id":"bacon-wrapped-green-beans","titel":"Bacon-Wrapped Green Beans","kategorie":"Beilage","tags":["grill","beilage","einfach","bacon"],"favorit":false,"portionen":4,"portionenEinheit":"Portionen","aufwand":"einfach","zeit":{"vorbereitung":15,"gesamt":35},"zutaten":[{"gruppe":"Green Beans","items":[{"menge":400,"einheit":"g","name":"Grüne Bohnen (frisch)","abteilung":"Gemüse & Früchte"},{"menge":8,"einheit":"Stück","name":"Bacon-Scheiben","abteilung":"Fleisch & Fisch"},{"menge":1,"einheit":"EL","name":"Olivenöl","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"Prise","name":"Salz","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"Prise","name":"Pfeffer","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"EL","name":"Ahornsirup (optional)","abteilung":"Grundnahrungsmittel"}]}],"schritte":["Bohnen waschen, Enden abschneiden.","Bohnen 3 Min. in kochendem Salzwasser im Topf blanchieren bis sie hellgrün und bissfest sind, dann sofort in Eiswasser abschrecken (stoppt das Garen, fixiert die Farbe).","Bohnen abtropfen, mit Küchenpapier trocken tupfen — sonst hält der Bacon nicht.","Mit den Händen Bündel von 6-8 Bohnen formen, jedes Bündel mit einer Bacon-Scheibe fest umwickeln. Ende mit Zahnstocher fixieren.","Mit Olivenöl beträufeln, leicht salzen und pfeffern.","Optional: Mit Ahornsirup einpinseln für Süss-Salzig-Glaze.","Auf dem Outdoorchef in der indirekten Zone oder im Backofen bei 200°C ca. 15-20 Min. garen. Wenn Steak parallel auf dem Sear Burner: Bündel auf der indirekten Zone parken — Timing passt.","Fertig: Bacon dunkelbraun und knusprig, Bohnen noch mit Biss. Vor dem Servieren Zahnstocher entfernen."],"tipps":["Bohnen vorher blanchieren ist wichtig, sonst werden sie nicht rechtzeitig gar.","Auf dem Grill neben dem Steak auf der indirekten Zone — Timing passt perfekt.","Zahnstocher helfen beim Fixieren, vor dem Servieren entfernen."],"notizen":"Perfekte Beilage zum Entrecôte auf dem Grill."},{"id":"baguette","titel":"Baguette — Overnight Cold Proof","kategorie":"Brot & Gebäck","tags":["backen","hefeteig","overnight","französisch","brot"],"favorit":false,"portionen":2,"portionenEinheit":"Baguettes","aufwand":"mittel","zeit":{"vorbereitung":30,"gesamt":900},"zutaten":[{"gruppe":"Teig","items":[{"menge":500,"einheit":"g","name":"Weissmehl (Type 550 oder Zopfmehl)","abteilung":"Grundnahrungsmittel"},{"menge":350,"einheit":"ml","name":"Wasser (lauwarm)","abteilung":"Sonstiges"},{"menge":10,"einheit":"g","name":"Salz","abteilung":"Gewürze & Öle"},{"menge":3,"einheit":"g","name":"Frischhefe","abteilung":"Grundnahrungsmittel"}]}],"schritte":["Mehl und Hefe in der Bosch-Schüssel mischen (Hefe nicht direkt aufs Salz, sonst stirbt sie ab).","Wasser dazugiessen und mit dem Knethaken auf niedriger Stufe kurz zu einem shaggy Teig vermengen — soll grob homogen sein, nicht glatt.","10 Min. ruhen lassen (Autolyse — Mehl quillt vor), dann Salz einstreuen.","Bosch Küchenmaschine mit Knethaken auf Stufe 2-3 ca. 8-10 Min. kneten. Teig ist klebrig (70% Hydration), das ist normal. Fertig: glatt, dehnbar, beim Hochziehen langsam zurückfliessend.","Teig in eingeölte Schüssel umfüllen, zugedeckt 1 Stunde bei Raumtemperatur gehen lassen.","Stretch & Fold von Hand mit angefeuchteten Fingern: Teig 4x von den Seiten zur Mitte falten. 30 Min. warten. Wiederholen. Teig wird mit jedem Mal straffer und weniger klebrig.","Schüssel abgedeckt über Nacht (12-16 Std.) in den Kühlschrank stellen — Teig sollte sich deutlich vergrössern und Blasen zeigen.","Am nächsten Tag: Teig vorsichtig auf bemehlte Fläche stürzen, halbieren. Nicht durchkneten — Blasen sollen drin bleiben.","Jede Hälfte mit den Händen sanft zu einem Baguette von ca. 40 cm formen (sanfte Rolltechnik), Naht unten lassen. Nicht entgasen!","Auf ein bemehltes Leinentuch (in Wellen gelegt) oder Baguette-Blech legen, 45-60 Min. aufgehen lassen. Fingertest: leichter Druck soll sich langsam zurückbilden.","Combi-Steamer oder Backofen auf 240°C vorheizen — wenn vorhanden mit Backstein und Dampfschale (Schale unten mit kochendem Wasser füllen direkt vor dem Einschieben).","Baguettes mit der Lame (oder einem sehr scharfen Messer) 3x diagonal einschneiden — schräger Winkel von ca. 45°, Schnitte 1 cm tief.","Im Combi-Steamer mit 240°C und maximalem Dampf für die ersten 10 Min. backen, dann ohne Dampf weitere 12-15 Min. Fertig: tiefgoldbraune Kruste, beim Klopfen auf den Boden hohl klingend, Kerntemperatur ca. 96°C."],"tipps":["Wenig Hefe + lange kalte Gare = maximaler Geschmack.","Dampf in den ersten 10 Min. ist entscheidend für die Kruste.","Teig soll feucht sein (70% Hydration) — klebt am Anfang, wird mit Stretch & Fold handhabbar.","Combi-Steamer ist perfekt: 240°C, Dampf auf Maximum für die ersten 10 Min."],"notizen":"Direkte Methode mit Overnight Cold Proof. Wenig Aufwand, viel Geschmack."},{"id":"brioche-buns","titel":"Brioche Burger Buns","kategorie":"Brot & Gebäck","tags":["backen","hefeteig","burger","brioche"],"favorit":false,"portionen":8,"portionenEinheit":"Buns","aufwand":"mittel","zeit":{"vorbereitung":30,"gesamt":210},"zutaten":[{"gruppe":"Teig","items":[{"menge":500,"einheit":"g","name":"Weissmehl","abteilung":"Grundnahrungsmittel"},{"menge":60,"einheit":"g","name":"Zucker","abteilung":"Grundnahrungsmittel"},{"menge":8,"einheit":"g","name":"Salz","abteilung":"Gewürze & Öle"},{"menge":10,"einheit":"g","name":"Frischhefe","abteilung":"Grundnahrungsmittel"},{"menge":3,"einheit":"Stück","name":"Eier","abteilung":"Milchprodukte"},{"menge":100,"einheit":"ml","name":"Milch (lauwarm)","abteilung":"Milchprodukte"},{"menge":80,"einheit":"g","name":"Butter (weich)","abteilung":"Milchprodukte"}]},{"gruppe":"Zum Bestreichen","items":[{"menge":1,"einheit":"Stück","name":"Eigelb","abteilung":"Milchprodukte"},{"menge":1,"einheit":"EL","name":"Milch","abteilung":"Milchprodukte"},{"menge":2,"einheit":"EL","name":"Sesam (optional)","abteilung":"Grundnahrungsmittel"}]}],"schritte":["Mehl, Zucker und Hefe in der Bosch-Schüssel mischen. Eier und lauwarme Milch dazugeben.","Bosch Küchenmaschine mit Knethaken auf Stufe 2-3 ca. 8 Min. kneten bis ein glatter, gleichmässiger Teig entsteht.","Salz einstreuen, kurz einkneten lassen. Dann die weiche Butter in 4-5 Portionen nacheinander dazugeben — jede Portion erst einarbeiten lassen, bevor die nächste dazukommt. Zwischendurch Schüsselwand mit Spatel abschaben.","Weiterkneten auf Stufe 3 bis der Teig seidig glänzt und sich vom Schüsselrand löst (10-15 Min. total). Fertig wenn Fenstertest gelingt: kleines Stück lässt sich dünn wie ein Fenster ausziehen ohne zu reissen.","Teig in eingeölte Schüssel umfüllen, zugedeckt 1.5 Stunden bei Raumtemperatur gehen lassen. Fertig: Volumen verdoppelt, beim Eindrücken bleibt eine Delle stehen.","Teig auf leicht bemehlte Fläche kippen, in 8 gleichmässige Stücke teilen (95 g pro Stück, Waage benutzen).","Jedes Stück mit der Handinnenfläche rund schleifen (Spannung aufbauen) und auf ein Blech mit Backpapier setzen — mindestens 4 cm Abstand zwischen den Buns.","Locker mit Frischhaltefolie abdecken, nochmals 45-60 Min. gehen lassen. Fertig wenn die Buns sichtbar gewachsen sind und sich beim sanften Andrücken langsam zurückbilden.","Backofen auf 175°C Ober-/Unterhitze vorheizen.","Eigelb mit Milch verquirlen, mit Backpinsel dünn auf jeden Bun streichen. Optional Sesam darüberstreuen.","Ca. 15-18 Min. backen bis tiefgoldbraun. Nicht zu dunkel — sie werden später beim Toasten auf der Plancha noch nachgebräunt."],"tipps":["Butter wirklich erst einarbeiten wenn der Teig schon gut entwickelt ist.","Buns nicht zu dunkel backen — sie werden noch auf dem Grill getoastet.","Lassen sich perfekt einfrieren und bei Bedarf auftauen."],"notizen":"Selbstgemachte Buns für die Smashed Burgers. Grosser Unterschied zu Gekauften."},{"id":"burrata-tomaten","titel":"Burrata mit Tomaten & Basilikumöl","kategorie":"Vorspeise","tags":["italienisch","vegetarisch","sommer","schnell","kalt"],"favorit":true,"portionen":4,"portionenEinheit":"Portionen","aufwand":"einfach","zeit":{"vorbereitung":15,"gesamt":15},"zutaten":[{"gruppe":"Salat","items":[{"menge":2,"einheit":"Stück","name":"Burrata (je ca. 125g)","abteilung":"Milchprodukte"},{"menge":400,"einheit":"g","name":"Tomaten (gemischt, reif)","abteilung":"Gemüse & Früchte"},{"menge":1,"einheit":"Prise","name":"Fleur de Sel","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"Prise","name":"Schwarzer Pfeffer","abteilung":"Gewürze & Öle"}]},{"gruppe":"Basilikumöl","items":[{"menge":1,"einheit":"Bund","name":"Frisches Basilikum","abteilung":"Gemüse & Früchte"},{"menge":100,"einheit":"ml","name":"Gutes Olivenöl (extra vergine)","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"Prise","name":"Salz","abteilung":"Gewürze & Öle"}]}],"schritte":["Basilikumblätter von den Stielen zupfen. Mit Olivenöl und Salz im Stabmixer-Becher 30 Sek. auf höchster Stufe pürieren bis tiefgrün und fein. Durch ein feines Sieb in eine Schüssel passieren — Trester verwerfen, klares Öl bleibt zurück.","Tomaten 30 Min. vorher aus dem Kühlschrank nehmen — bei Zimmertemperatur sind die Aromen viel intensiver. In unterschiedliche Formen schneiden (Scheiben, Hälften, Viertel) für optische Vielfalt.","Tomaten auf Tellern fächerartig anrichten, leicht mit Fleur de Sel salzen.","Burrata in die Mitte setzen und mit den Händen oder einem Messer leicht einritzen, dass die Innenfüllung sichtbar wird.","Grosszügig mit Basilikumöl beträufeln — auf die Burrata und um die Tomaten herum.","Mit Fleur de Sel und frisch gemahlenem schwarzen Pfeffer abschmecken.","Sofort servieren mit knusprigem Brot (Baguette oder Butterzopf)."],"tipps":["Burrata unbedingt Raumtemperatur — nie direkt aus dem Kühlschrank servieren.","Tomaten sollten richtig reif sein, Saison ist alles bei diesem Gericht.","Basilikumöl kann man auf Vorrat machen und im Kühlschrank 3-4 Tage aufbewahren.","Optional: Pinienkerne anrösten und drüberstreuen."],"notizen":"Perfekte Vorspeise vor dem Entrecôte. Im Sommer ein Muss."},{"id":"butterzopf","titel":"Butterzopf","kategorie":"Brot & Gebäck","tags":["backen","hefeteig","overnight","sonntagsklassiker"],"favorit":true,"portionen":1,"portionenEinheit":"Zopf (ca. 800g)","aufwand":"mittel","zeit":{"vorbereitung":30,"gesamt":780},"zutaten":[{"gruppe":"Teig","items":[{"menge":500,"einheit":"g","name":"Weissmehl","abteilung":"Grundnahrungsmittel"},{"menge":1.5,"einheit":"TL","name":"Salz","abteilung":"Gewürze & Öle"},{"menge":40,"einheit":"g","name":"Zucker","abteilung":"Grundnahrungsmittel"},{"menge":10,"einheit":"g","name":"Frischhefe","abteilung":"Grundnahrungsmittel"},{"menge":80,"einheit":"g","name":"Butter (weich)","abteilung":"Milchprodukte"},{"menge":3,"einheit":"dl","name":"Milch (lauwarm)","abteilung":"Milchprodukte"}]},{"gruppe":"Zum Bestreichen","items":[{"menge":1,"einheit":"Stück","name":"Eigelb","abteilung":"Milchprodukte"},{"menge":1,"einheit":"EL","name":"Milch","abteilung":"Milchprodukte"}]}],"schritte":["Mehl und Salz in der Bosch-Schüssel mischen.","Hefe und Zucker in lauwarmer Milch (ca. 35°C) auflösen und 5 Min. stehen lassen — fertig wenn die Oberfläche schaumig wird (zeigt aktive Hefe).","Milch-Hefe-Gemisch zum Mehl giessen und mit der Bosch Küchenmaschine mit Knethaken auf Stufe 2 zu einem Teig kneten (ca. 4-5 Min.).","Weiche Butter in 4 Portionen nacheinander einkneten, jede Portion erst einarbeiten lassen bevor die nächste dazukommt. Auf Stufe 3 weiterkneten bis der Teig seidig glänzt und sich vom Schüsselrand löst (ca. 10 Min. total). Fertig wenn Fenstertest gelingt: Teig lässt sich dünn ausziehen ohne zu reissen.","Teig in eingeölte Schüssel umfüllen, zugedeckt 1 Stunde bei Raumtemperatur aufgehen lassen — Volumen sollte sich deutlich vergrössern.","Teig kurz von Hand zusammenstossen, in Frischhaltefolie wickeln und über Nacht (mind. 8 Std.) im Kühlschrank lagern.","Am nächsten Morgen: Teig 30 Min. bei Raumtemperatur akklimatisieren lassen — sonst lässt er sich schwer flechten.","Teig halbieren, jede Hälfte zu einem gleichmässigen Strang von ca. 50 cm Länge ausrollen — von der Mitte nach aussen rollen, nicht hin- und herziehen.","Stränge oben zusammendrücken und zu einem Zopf flechten — beim Schweizer 2-Strang-Zopf abwechselnd übereinander legen.","Auf ein mit Backpapier belegtes Blech legen, 45-60 Min. aufgehen lassen. Fertig: Zopf wirkt aufgequollen, Druckstelle vom Finger bildet sich langsam zurück.","Backofen auf 180°C Ober-/Unterhitze vorheizen.","Eigelb mit 1 EL Milch verquirlen, mit Backpinsel gleichmässig auf den Zopf streichen — auch in die Flechtrillen.","Ca. 35-40 Min. backen bis tiefgoldbraun. Falls Oberfläche zu schnell bräunt: nach 25 Min. mit Alufolie abdecken. Fertig: Kerntemperatur ca. 90°C, beim Klopfen auf den Boden hohl klingend."],"tipps":["Overnight-Gare im Kühlschrank entwickelt mehr Geschmack als direktes Backen.","Teig sollte beim Kneten den Fenstertest bestehen — dünn ausziehbar ohne zu reissen.","Eigelb mit etwas Milch verdünnt ergibt einen gleichmässigeren Glanz.","Kerntemperatur ca. 90°C = perfekt durchgebacken."],"notizen":"Nicos Sonntagsklassiker. Funktioniert am besten wenn der Teig am Samstagabend vorbereitet wird."},{"id":"cafe-de-paris-butter","titel":"Café de Paris Butter","kategorie":"Sauce & Dip","tags":["grill","butter","klassiker","steak"],"favorit":true,"portionen":8,"portionenEinheit":"Portionen","aufwand":"einfach","zeit":{"vorbereitung":15,"gesamt":135},"zutaten":[{"gruppe":"Butter","items":[{"menge":250,"einheit":"g","name":"Butter (weich)","abteilung":"Milchprodukte"},{"menge":2,"einheit":"TL","name":"Dijon-Senf","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"EL","name":"Kapern (fein gehackt)","abteilung":"Sonstiges"},{"menge":2,"einheit":"Stück","name":"Sardellen (fein gehackt)","abteilung":"Fleisch & Fisch"},{"menge":2,"einheit":"Stück","name":"Knoblauchzehen (gepresst)","abteilung":"Gemüse & Früchte"},{"menge":2,"einheit":"EL","name":"Petersilie (fein gehackt)","abteilung":"Gemüse & Früchte"},{"menge":1,"einheit":"EL","name":"Schnittlauch (fein geschnitten)","abteilung":"Gemüse & Früchte"},{"menge":1,"einheit":"TL","name":"Estragon (fein gehackt)","abteilung":"Gemüse & Früchte"},{"menge":1,"einheit":"TL","name":"Paprikapulver (edelsüss)","abteilung":"Gewürze & Öle"},{"menge":0.5,"einheit":"TL","name":"Currypulver","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"EL","name":"Cognac oder Brandy","abteilung":"Getränke"},{"menge":1,"einheit":"Prise","name":"Salz","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"Prise","name":"Pfeffer","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"TL","name":"Zitronensaft","abteilung":"Gemüse & Früchte"}]}],"schritte":["Butter mindestens 2 Std. vorher aus dem Kühlschrank nehmen — sie muss richtig weich sein, fast cremig (Fingerdrucktest: gibt mühelos nach).","Petersilie, Schnittlauch, Estragon und Knoblauch von Hand mit dem Messer sehr fein hacken. Kapern und Sardellen ebenfalls fein hacken — fast zu einer Paste.","Weiche Butter in eine Schüssel geben und mit dem Handmixer 1-2 Min. auf mittlerer Stufe cremig aufschlagen — soll hellgelb und luftig sein.","Alle restlichen Zutaten (Senf, Kapern, Sardellen, Knoblauch, Kräuter, Paprika, Curry, Cognac, Salz, Pfeffer, Zitronensaft) zur Butter geben.","Mit dem Handmixer auf niedriger Stufe alles gleichmässig untermischen, ca. 30 Sek. — nicht zu lange schlagen, sonst wird die Butter zu fluffig.","Abschmecken — soll kräftig und etwas zu salzig wirken, die kalte Butter dämpft die Aromen später.","Butter auf Frischhaltefolie geben, zu einer gleichmässigen Rolle von ca. 4 cm Durchmesser formen. Enden wie ein Bonbon zudrehen.","Mindestens 2 Stunden im Kühlschrank fest werden lassen, oder direkt einfrieren.","Vor dem Servieren in ca. 1 cm dicke Scheiben schneiden (gefroren lässt sie sich am saubersten schneiden) und direkt auf das heisse Steak legen — schmilzt von der Resthitze."],"tipps":["Lässt sich perfekt einfrieren — hält 2-3 Monate.","Etwas mehr Cognac schadet nie.","Auch super auf Ofenkartoffeln oder zu gegrilltem Gemüse.","Die Sardellen schmeckt man nicht raus, sie bringen aber die nötige Umami-Tiefe."],"notizen":"Klassiker zum Entrecôte. Immer eine Rolle im Tiefkühler haben."},{"id":"gnocchi-thymian-butter","titel":"Gnocchi in Thymian-Butter","kategorie":"Beilage","tags":["italienisch","schnell","vegetarisch","einfach"],"favorit":false,"portionen":4,"portionenEinheit":"Portionen","aufwand":"einfach","zeit":{"vorbereitung":5,"gesamt":15},"zutaten":[{"gruppe":"Gnocchi","items":[{"menge":500,"einheit":"g","name":"Gnocchi (frisch, aus Kühlregal)","abteilung":"Grundnahrungsmittel"},{"menge":80,"einheit":"g","name":"Butter","abteilung":"Milchprodukte"},{"menge":4,"einheit":"Zweig","name":"Frischer Thymian","abteilung":"Gemüse & Früchte"},{"menge":1,"einheit":"Prise","name":"Salz","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"Prise","name":"Schwarzer Pfeffer","abteilung":"Gewürze & Öle"},{"menge":30,"einheit":"g","name":"Parmesan gerieben (optional)","abteilung":"Milchprodukte"}]}],"schritte":["Grossen Topf mit Salzwasser aufsetzen, zum Kochen bringen.","Butter in einer grossen Pfanne (idealerweise Gusseisen) bei mittlerer Hitze schmelzen, Thymianzweige dazugeben. Köcheln lassen bis die Milchfeststoffe am Boden goldbraun werden und es nussig duftet — Beurre noisette, ca. 2-3 Min. Aufpassen: Übergang von goldbraun zu verbrannt geht schnell, sofort vom Herd nehmen falls dunkel.","Gnocchi ins kochende Salzwasser geben. Fertig wenn sie an die Oberfläche schwimmen — ca. 2-3 Min.","Gnocchi mit der Schaumkelle aus dem Wasser heben und direkt in die Pfanne mit der Thymian-Butter geben — etwas Kochwasser darf mitkommen, das emulgiert die Butter zu einer sämigeren Sauce.","Bei mittlerer Hitze rundum goldbraun anbraten, ca. 3-4 Min. Nicht zu oft wenden — pro Seite mind. 1 Min. ruhen lassen für eine knusprige Kruste. Pfanne nicht überfüllen, sonst dampfen die Gnocchi statt zu bräunen.","Thymianzweige entfernen (Blätter abstreifen, falls noch dran), mit Salz und Pfeffer abschmecken.","Optional: Vor dem Servieren mit fein geriebenem Parmesan bestreuen — direkt auf die heissen Gnocchi, dass er leicht anschmilzt."],"tipps":["Beurre noisette (nussige Butter) macht den Unterschied — Geduld beim Bräunen, aber nicht verbrennen lassen.","Salbei oder Rosmarin funktionieren genauso — Thymian ist die elegantere, feinere Variante.","Frische Gnocchi aus dem Kühlregal sind besser als Trockengnocchi. Noch besser: hausgemacht.","Pfanne nicht überfüllen — sonst bekommen die Gnocchi keine Kruste, sondern werden matschig. Bei grosser Menge lieber in zwei Durchgängen anbraten."],"notizen":"Schnelle, elegante Beilage. Passt zu Rindsfilet, Lammschulter oder jedem Fleisch mit kräftiger Sauce."},{"id":"gruener-spargel-hollandaise","titel":"Grüner Spargel mit Sauce Hollandaise","kategorie":"Beilage","tags":["frühling","spargel","sauce","klassiker","vegetarisch"],"favorit":false,"portionen":4,"portionenEinheit":"Portionen","aufwand":"mittel","zeit":{"vorbereitung":15,"gesamt":30},"zutaten":[{"gruppe":"Spargel","items":[{"menge":1,"einheit":"kg","name":"Grüner Spargel","abteilung":"Gemüse & Früchte"},{"menge":1,"einheit":"Prise","name":"Salz","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"Prise","name":"Zucker","abteilung":"Grundnahrungsmittel"},{"menge":1,"einheit":"EL","name":"Butter (für Kochwasser)","abteilung":"Milchprodukte"}]},{"gruppe":"Sauce Hollandaise (Stabmixer-Methode)","items":[{"menge":3,"einheit":"Stück","name":"Eigelb (Grösse M)","abteilung":"Milchprodukte"},{"menge":200,"einheit":"g","name":"Butter","abteilung":"Milchprodukte"},{"menge":1,"einheit":"EL","name":"Zitronensaft","abteilung":"Gemüse & Früchte"},{"menge":1,"einheit":"Prise","name":"Salz","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"Prise","name":"Cayennepfeffer","abteilung":"Gewürze & Öle"}]}],"schritte":["Spargel vorbereiten: Untere Enden mit den Händen abbrechen (brechen natürlich an der holzigen Stelle). Bei grünem Spargel ist Schälen meist nicht nötig — höchstens das untere Drittel mit dem Sparschäler leicht schälen.","Grossen Topf mit reichlich Salzwasser aufsetzen, Prise Zucker und 1 EL Butter dazugeben. Aufkochen.","Spargel ins sprudelnde Wasser legen, 8-10 Min. kochen. Fertig: bissfest (al dente) — Messer dringt mit leichtem Widerstand ein, Spargel hat noch Spannung.","Hollandaise parallel: Butter in einem kleinen Pfännchen auf der Herdplatte schmelzen und heiss werden lassen (ca. 70°C, leicht schäumend).","Eigelb, Zitronensaft, Salz und Cayennepfeffer in den hohen Stabmixer-Becher geben.","Die heisse Butter direkt über die Eigelb-Mischung giessen — nicht umrühren.","Stabmixer bis auf den Boden des Bechers drücken, einschalten und 10 Sek. unten halten — Eigelb und Butter beginnen zu emulgieren.","Dann den Stabmixer langsam nach oben ziehen — die Sauce emulgiert in ca. 30 Sek. zu einer cremigen, hellgelben Hollandaise. Fertig: dickflüssig, glänzend, fliesst langsam vom Löffel.","Abschmecken. Wenn zu dick: 1 EL warmes Wasser einrühren. Bis zum Servieren in einer Thermoskanne oder über sehr lauwarmem Wasserbad warmhalten — nie über 60°C, sonst gerinnt sie.","Spargel abtropfen, auf vorgewärmten Tellern anrichten und mit der Sauce Hollandaise servieren."],"tipps":["Stabmixer-Methode ist praktisch gelingsicher — viel einfacher als die klassische Wasserbad-Variante.","Sauce nie über 60°C erhitzen, sonst gerinnt sie. Warmhalten z.B. in einer Thermoskanne oder über sehr lauwarmem Wasserbad.","Weisser Spargel funktioniert genauso, muss aber komplett geschält und 15-18 Min. gekocht werden.","Hollandaise schmeckt auch super zu pochiertem Ei, Eggs Benedict oder Lachs.","Spargel-Saison: April bis Juni — dann ist er am besten und günstigsten."],"notizen":"Klassischer Frühlings-Hit, passt perfekt zu Rindsfilet oder pur als Vorspeise."},{"id":"lamm-schulter","titel":"Lamm-Schulter vom Grill (Low & Slow)","kategorie":"Hauptgang","tags":["grill","fleisch","lamm","low-and-slow","rotisserie"],"favorit":false,"portionen":6,"portionenEinheit":"Portionen","aufwand":"aufwändig","zeit":{"vorbereitung":20,"gesamt":300},"zutaten":[{"gruppe":"Lamm","items":[{"menge":1.5,"einheit":"kg","name":"Lammschulter (mit Knochen)","abteilung":"Fleisch & Fisch"},{"menge":3,"einheit":"EL","name":"Olivenöl","abteilung":"Gewürze & Öle"},{"menge":4,"einheit":"Stück","name":"Knoblauchzehen","abteilung":"Gemüse & Früchte"},{"menge":2,"einheit":"Zweig","name":"Rosmarin","abteilung":"Gemüse & Früchte"},{"menge":2,"einheit":"Zweig","name":"Thymian","abteilung":"Gemüse & Früchte"},{"menge":1,"einheit":"Stück","name":"Zitrone (Saft + Abrieb)","abteilung":"Gemüse & Früchte"},{"menge":1,"einheit":"EL","name":"Salz","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"TL","name":"Schwarzer Pfeffer","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"TL","name":"Kreuzkümmel (gemahlen)","abteilung":"Gewürze & Öle"}]}],"schritte":["Knoblauch von Hand mit dem Messer fein hacken (oder mit der Knoblauchpresse). Rosmarin- und Thymiannadeln von den Stielen streifen, fein hacken. Mit Olivenöl, Zitronensaft, Zitronenabrieb, Salz, Pfeffer und Kreuzkümmel in einer Schüssel zu einer Marinade vermischen.","Lammschulter rundherum mit einem scharfen Messer ca. 1 cm tief einschneiden (Rautenmuster), Marinade gründlich von Hand einmassieren — auch in die Schnitte.","In Frischhaltefolie wickeln und mind. 2 Stunden marinieren, besser über Nacht im Kühlschrank.","1 Stunde vor dem Grillieren aus dem Kühlschrank nehmen — Raumtemperatur ist Pflicht.","Outdoorchef auf indirekte Hitze einrichten, ca. 140°C. Backburner ist ideal — gleichmässige Strahlungswärme von hinten.","Optional auf die Rotisserie spiessen — sorgt für rundum gleichmässige Bräunung.","Typhur-Sonde in die dickste Stelle stecken (nicht in den Knochen). Deckel schliessen, grillen bis Kerntemperatur 85-90°C (Pull-Temperatur). Dauert 3.5-4.5 Std. — Geduld, der Grill macht die Arbeit.","Fertig: Fleisch ist butterzart, lässt sich mit der Gabel mühelos einstechen, fällt fast vom Knochen. Aussen tiefbraune Kruste.","Vom Grill nehmen, locker mit Alufolie abdecken und 15 Min. ruhen lassen.","Mit zwei Gabeln zerzupfen — das Fleisch sollte fast von selbst auseinanderfallen.","Mit frischem Zitronensaft beträufeln und servieren."],"tipps":["Low & Slow ist der Schlüssel — nicht über 150°C gehen.","Rotisserie liefert die gleichmässigste Bräunung.","Innere Temperatur 85-90°C klingt viel, aber bei dieser Methode wird das Kollagen komplett abgebaut.","Passt super zu Fladenbrot, Hummus und einem einfachen Salat."],"notizen":"Braucht Zeit, aber die Arbeit macht der Grill. Perfekt für entspannte Nachmittage mit Gästen."},{"id":"lasagne-bolognese","titel":"Lasagne Bolognese","kategorie":"Hauptgang","tags":["italienisch","ofen","für-gäste","klassiker","vortag-tauglich","pikant"],"favorit":false,"portionen":6,"aufwand":"mittel","zeit":{"vorbereitung":30,"gesamt":150},"zutaten":[{"gruppe":"Bolognese","items":[{"menge":500,"einheit":"g","name":"Rindshackfleisch","abteilung":"Fleisch & Fisch"},{"menge":200,"einheit":"g","name":"Schweinshackfleisch","abteilung":"Fleisch & Fisch"},{"menge":1,"einheit":"Stück","name":"grosse Zwiebel","abteilung":"Gemüse & Früchte"},{"menge":2,"einheit":"Stück","name":"Karotten","abteilung":"Gemüse & Früchte"},{"menge":2,"einheit":"Stück","name":"Stangen Staudensellerie","abteilung":"Gemüse & Früchte"},{"menge":3,"einheit":"Stück","name":"Knoblauchzehen","abteilung":"Gemüse & Früchte"},{"menge":0.5,"einheit":"TL","name":"Chiliflocken","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"EL","name":"Tomatenpüree","abteilung":"Grundnahrungsmittel"},{"menge":800,"einheit":"g","name":"gehackte Tomaten (Dose)","abteilung":"Grundnahrungsmittel"},{"menge":200,"einheit":"ml","name":"Rotwein (trocken)","abteilung":"Getränke"},{"menge":300,"einheit":"ml","name":"Rinderbouillon","abteilung":"Grundnahrungsmittel"},{"menge":1,"einheit":"EL","name":"Olivenöl","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"Stück","name":"Lorbeerblatt","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"Prise","name":"Muskat","abteilung":"Gewürze & Öle"},{"menge":null,"einheit":null,"name":"Salz, schwarzer Pfeffer","abteilung":"Gewürze & Öle"}]},{"gruppe":"Béchamel","items":[{"menge":500,"einheit":"ml","name":"Vollmilch","abteilung":"Milchprodukte"},{"menge":50,"einheit":"g","name":"Butter","abteilung":"Milchprodukte"},{"menge":50,"einheit":"g","name":"Weissmehl","abteilung":"Grundnahrungsmittel"},{"menge":1,"einheit":"Prise","name":"Muskat","abteilung":"Gewürze & Öle"},{"menge":null,"einheit":null,"name":"Salz, weisser Pfeffer","abteilung":"Gewürze & Öle"}]},{"gruppe":"Aufbau","items":[{"menge":250,"einheit":"g","name":"Lasagneblätter (ohne Vorkochen)","abteilung":"Grundnahrungsmittel"},{"menge":200,"einheit":"g","name":"Parmesan (frisch gerieben, aus dem Block)","abteilung":"Milchprodukte"},{"menge":50,"einheit":"g","name":"Pecorino Romano (frisch gerieben)","abteilung":"Milchprodukte"}]}],"schritte":["Zwiebel, Karotten, Sellerie und Knoblauch von Hand mit dem Messer sehr fein würfeln — gleichmässige 3-4 mm Würfel (Soffritto). Mixer/Stabmixer machen's matschig statt würfelig.","In einem grossen Topf (idealerweise Gusseisen) Olivenöl erhitzen, Soffritto mit den Chiliflocken bei mittlerer Hitze 8-10 Min. sanft anschwitzen bis alles weich und glasig ist — nicht bräunen, das Gemüse soll seine Süsse abgeben.","Hackfleisch zugeben, mit dem Holzkochlöffel zerteilen und bei höherer Hitze krümelig anbraten — 5-7 Min., bis das Fleisch keine rosa Stellen mehr hat und sich am Topfboden Röststoffe (dunkelbrauner Belag) bilden.","Tomatenpüree einrühren, 1 Min. mitrösten — Farbe wechselt von hellrot zu tiefrot, bisschen rauchiger Duft.","Mit Rotwein ablöschen — die Röststoffe vom Boden mit dem Holzkochlöffel loskratzen. Wein komplett einkochen lassen, bis der Topfboden wieder fast trocken ist.","Gehackte Tomaten und Bouillon zugeben, Lorbeerblatt, Salz, Pfeffer, Muskat einrühren.","Auf niedrigste Hitze reduzieren — soll nur ganz leise blubbern. Halb abgedeckt mind. 90 Min. köcheln lassen, alle 20 Min. umrühren. Falls zu trocken: etwas Wasser oder Bouillon zugeben. Fertig: tiefdunkle Farbe, dickflüssig, Fett trennt sich leicht ab.","Béchamel parallel: Butter in einem Topf bei mittlerer Hitze schmelzen, Mehl einstreuen und mit dem Schwingbesen 2 Min. unter ständigem Rühren anschwitzen. Soll hell bleiben — keine Farbe (das wäre eine braune Mehlschwitze).","Milch in 3 Portionen langsam zugiessen, mit dem Schwingbesen jeweils glatt rühren bevor die nächste Portion dazukommt — verhindert Klumpen.","5-10 Min. bei niedriger Hitze köcheln lassen bis eine cremige, nicht zu dicke Sauce entsteht. Fertig: fliesst vom Löffel, beschichtet ihn aber leicht.","Mit Salz, weissem Pfeffer und grosszügig Muskat abschmecken.","Backofen auf 180°C Ober-/Unterhitze vorheizen.","In eine grosse Auflaufform (ca. 25x35 cm) eine dünne Schicht Bolognese als Boden geben — verhindert dass die Lasagneblätter ankleben.","Lasagneblätter drauf (überlappend, nicht stossen), dann Bolognese, dann Béchamel, dann Mischung aus Parmesan und Pecorino. Wiederholen bis alles verbraucht ist. Letzte Schicht: Béchamel + grosszügig gemischter Käse obendrauf.","35-40 Min. backen. Fertig: Oberfläche tiefgoldbraun, an den Rändern blubbert es sichtbar, Käse leicht knusprig.","Kritisch: 10-15 Min. vor dem Anschneiden ruhen lassen — sonst läuft sie beim Schneiden auseinander."],"tipps":["Vortag: Bolognese einen Tag vorher kochen, kalt stellen. Am Tag der Lasagne zusammenbauen und backen. Deutlich mehr Aroma.","Besseres Fleisch: Wenn möglich Bio-Hackfleisch mit etwas Fettanteil. Mageres Fleisch wird trocken.","Wein: Nimm einen Wein den du auch trinken würdest. Kein Kochwein aus dem Billig-Regal.","Parmesan und Pecorino aus dem Block: Der Unterschied zu vorgeriebenem ist riesig.","Pecorino Romano ist salziger und kräftiger als Parmesan — 50g reichen. Falls nicht vorhanden, mit Parmesan ausgleichen.","Ofentemperatur: Wenn dein Ofen sehr schnell bräunt, die letzten 10 Minuten mit Alufolie abdecken.","Schärfe: Die 0.5 TL Chiliflocken geben subtile Wärme — nicht scharf, aber runder. Beim nächsten Mal kannst du auf 1 TL erhöhen."],"notizen":"Klassische Emilia-Romagna-Version ohne Mozzarella — näher am Original, schnittfester, aromatischer. Gut machbar am Vortag → perfekt für Gäste am Sonntagabend. Rest schmeckt auch kalt am nächsten Tag hervorragend."},{"id":"panna-cotta","titel":"Panna Cotta","kategorie":"Dessert","tags":["italienisch","dessert","einfach","make-ahead"],"favorit":true,"portionen":6,"portionenEinheit":"Gläser","aufwand":"einfach","zeit":{"vorbereitung":15,"gesamt":255},"zutaten":[{"gruppe":"Panna Cotta","items":[{"menge":500,"einheit":"ml","name":"Vollrahm (35% Fett)","abteilung":"Milchprodukte"},{"menge":100,"einheit":"ml","name":"Milch","abteilung":"Milchprodukte"},{"menge":60,"einheit":"g","name":"Zucker","abteilung":"Grundnahrungsmittel"},{"menge":1,"einheit":"Stück","name":"Vanilleschote","abteilung":"Gewürze & Öle"},{"menge":3,"einheit":"Stück","name":"Gelatineblätter","abteilung":"Grundnahrungsmittel"}]},{"gruppe":"Beerensauce (optional)","items":[{"menge":200,"einheit":"g","name":"Gemischte Beeren","abteilung":"Gemüse & Früchte"},{"menge":2,"einheit":"EL","name":"Zucker","abteilung":"Grundnahrungsmittel"},{"menge":1,"einheit":"EL","name":"Zitronensaft","abteilung":"Gemüse & Früchte"}]}],"schritte":["Gelatineblätter in einer Schüssel mit kaltem Wasser einweichen — ca. 5 Min., bis sie weich und biegsam sind.","Vanilleschote mit einem scharfen Messer längs aufschneiden, das Mark mit der Messerrückseite auskratzen.","Rahm, Milch, Zucker, Vanillemark und Schote in einem Topf bei mittlerer Hitze auf der Herdplatte langsam erhitzen. Nicht kochen — fertig wenn es leicht dampft und am Rand kleine Bläschen entstehen (ca. 80°C).","Vom Herd nehmen, Vanilleschote entfernen.","Gelatine mit den Händen kräftig ausdrücken (überschüssiges Wasser raus) und in die heisse Masse einrühren — mit Schwingbesen oder Spatel, bis komplett aufgelöst (keine Klümpchen mehr sichtbar).","Durch ein feines Sieb in die Bodum-Gläser oder Förmchen giessen — fängt Vanillereste und mögliche Klümpchen.","Komplett abkühlen lassen, dann mind. 4 Std. (besser über Nacht) im Kühlschrank fest werden lassen. Fertig: Oberfläche wackelt nur noch leicht beim Anstossen, fest aber zart.","Beerensauce: Beeren, Zucker und Zitronensaft im kleinen Topf 2-3 Min. aufkochen, mit dem Spatel oder einer Gabel grob zerdrücken (Stücke sind gewollt). Abkühlen lassen.","Vor dem Servieren mit Beerensauce und frischen Beeren garnieren."],"tipps":["3 Blatt Gelatine = perfekter Wackelpudding-Effekt. Mehr = zu fest, weniger = fliesst.","Kann 2 Tage im Voraus zubereitet werden — perfektes Gästedessert.","Im Sommer auch mit Passionsfrucht oder Mango statt Beeren.","Rahm mit 35% Fett ist wichtig, nicht Halbrahm."],"notizen":"Unkompliziertes Dessert das immer funktioniert. Am Vortag machen, beim Essen zurücklehnen."},{"id":"rindsfilet-reverse-sear","titel":"Rindsfilet Mittelstück — Reverse Sear mit Café de Paris","kategorie":"Hauptgang","tags":["grill","fleisch","reverse-sear","rindsfilet","für-gäste","klassiker"],"favorit":false,"portionen":4,"portionenEinheit":"Portionen","aufwand":"mittel","zeit":{"vorbereitung":15,"gesamt":135},"zutaten":[{"gruppe":"Filet","items":[{"menge":1,"einheit":"kg","name":"Rindsfilet-Mittelstück (Chateaubriand)","abteilung":"Fleisch & Fisch"},{"menge":2,"einheit":"TL","name":"Grobes Meersalz (Fleur de Sel)","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"TL","name":"Schwarzer Pfeffer (frisch gemahlen)","abteilung":"Gewürze & Öle"}]},{"gruppe":"Zum Servieren","items":[{"menge":4,"einheit":"Scheibe","name":"Café de Paris Butter (ca. 1 cm dick)","abteilung":"Tiefkühl"}]}],"schritte":["Filet 1-2 Stunden vor dem Grillieren aus dem Kühlschrank nehmen und bei Raumtemperatur temperieren lassen.","Filet trocken tupfen, rundum grosszügig mit grobem Meersalz würzen. Pfeffer noch NICHT — verbrennt beim Sear.","Outdoorchef einrichten: Indirekte Zone auf 120°C vorheizen, Sear Burner für später bereit (auf Maximum vorheizen ca. 5 Min. vor dem Searen).","Typhur-Sonde mittig in die dickste Stelle des Filets stecken — Spitze in die Mitte des Fleisches.","Filet auf die indirekte Zone legen, Deckel schliessen.","Langsam garen bis Kerntemperatur 48°C erreicht ist — ca. 45-60 Min. bei 1 kg. Sonde meldet, kein Aufmachen nötig.","Filet vom Grill nehmen, auf einem Brett 5 Min. ruhen lassen. Währenddessen Sear Burner auf Vollgas (250°C+) hochfahren.","Filet auf die direkte Zone legen, rundum scharf angrillen — 60-90 Sek. pro Seite, NICHT bewegen während des Seariens. Auch die Schmalseiten kurz searen. Endkerntemperatur 52-54°C — Sonde meldet.","Vom Grill nehmen, jetzt mit frisch gemahlenem schwarzen Pfeffer würzen, in ca. 2 cm dicke Tranchen schneiden (gegen die Faser).","Scheiben gefrorener Café de Paris Butter direkt auf die heissen Filetstücke legen — schmelzen von der Resthitze in eine glänzende Sauce. Sofort servieren."],"tipps":["Kerntemperatur-Thermometer ist Pflicht bei einem Mittelstück — Augenmass reicht bei 1 kg nicht.","Reverse Sear = gleichmässiges Rosa von Rand zu Rand, perfekte Kruste, keine graue Zone.","Kerntemperatur steigt beim Searen nochmal 2-3°C — also rechtzeitig von der indirekten Zone nehmen.","Café de Paris Butter gefroren in Scheiben schneiden — lässt sich so viel sauberer portionieren.","Bei Reverse Sear braucht das Fleisch nach dem Searen keine lange Nachruhe mehr (anders als bei klassisch).","Alternativ: Rotwein-Jus statt Café de Paris."],"notizen":"Das zarteste Stück vom Rind, zum klassischen Gästeessen. 1 kg Mittelstück ergibt ca. 250 g pro Person für 4 Personen — perfekt."},{"id":"schweinsnierstueck-reverse-sear","titel":"Schweinsnierstück — Reverse Sear & Finish","kategorie":"Hauptgang","tags":["grill","reverse-sear","schwein","sear-burner","für-gäste"],"favorit":false,"portionen":4,"aufwand":"mittel","zeit":{"vorbereitung":15,"gesamt":80},"zutaten":[{"gruppe":"Fleisch","items":[{"menge":1.2,"einheit":"kg","name":"Schweinsnierstück, am Stück","abteilung":"Fleisch & Fisch"},{"menge":1,"einheit":"Prise","name":"Fleur de Sel","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"Prise","name":"Schwarzer Pfeffer, frisch gemahlen","abteilung":"Gewürze & Öle"}]},{"gruppe":"Dry Rub","items":[{"menge":2,"einheit":"EL","name":"Olivenöl","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"TL","name":"Geräuchertes Paprikapulver","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"TL","name":"Knoblauchpulver","abteilung":"Gewürze & Öle"},{"menge":0.5,"einheit":"TL","name":"Zwiebelpulver","abteilung":"Gewürze & Öle"},{"menge":4,"einheit":"Zweig","name":"Frischer Thymian","abteilung":"Gemüse & Früchte"}]},{"gruppe":"Zum Finish","items":[{"menge":1,"einheit":"Prise","name":"Flockensalz (Maldon o.ä.)","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"Stück","name":"Knoblauchzehe","abteilung":"Gemüse & Früchte"},{"menge":30,"einheit":"g","name":"Butter oder Café de Paris Butter","abteilung":"Milchprodukte"}]}],"schritte":["Nierstück 1 Stunde vor dem Grillieren aus dem Kühlschrank nehmen — Raumtemperatur ist Pflicht für gleichmässiges Garen.","Silberhaut mit dem Messer entfernen falls vorhanden, Fleisch mit Küchenpapier trocken tupfen.","Mit Olivenöl einreiben, Dry Rub (Paprika, Knoblauch, Zwiebel) gleichmässig von Hand einmassieren, Thymianzweige darauflegen. Noch NICHT salzen — zieht sonst Wasser.","Outdoorchef für indirekte Hitze einrichten: 120-130°C. Fleisch auf die indirekte Zone legen, Typhur-Sonde mittig in die dickste Stelle stechen.","Bei geschlossenem Deckel ca. 40-50 Min. niedergaren bis Kerntemperatur 58-60°C — Sonde meldet.","Vom Grill nehmen, locker in Alufolie einwickeln und 10 Min. ruhen lassen. Währenddessen den Sear Burner auf Maximum aufheizen (mind. 5 Min. — muss richtig glühen).","Nierstück in 3-4 cm dicke Medaillons schneiden (gegen die Faser). Jetzt mit Fleur de Sel und frisch gemahlenem Pfeffer würzen.","Medaillons auf den Sear Burner: 60-90 Sek. pro Seite, NICHT bewegen während des Seariens. Fertig wenn dunkelbraune Maillard-Kruste — Rauch und Zischen sind erwünscht. Einmal pro Seite reicht, Endkerntemperatur 62-63°C.","Optional in den letzten 20 Sek. ein Stück kalte Butter oder Café de Paris Butter auf jedes Medaillon legen — schmilzt zu glänzender Sauce. Halbierte Knoblauchzehe über die Schnittflächen reiben.","Sofort servieren."],"tipps":["Kerntemperatur ist König — ohne Fühler wird's Glücksspiel. 58 °C am Stück, nach dem Sear landest du bei perfekten 62–63 °C.","Sear Burner muss richtig heiss sein: Maillard-Reaktion braucht Hitze, kein Schmoren.","Medaillons nicht unter 2.5 cm schneiden — sonst verlierst du beim Sear den Vorteil des Niedergarens.","Dazu passt: Grillgemüse, Kräuterbutter, Ofenkartoffeln oder ein frischer Salat.","Café de Paris Butter als Finish macht das Ganze nochmal nächstes Level — Rezept ist schon in der App."]},{"id":"smashed-burger","titel":"Smashed Burger mit Brioche Buns","kategorie":"Hauptgang","tags":["grill","plancha","fleisch","burger","amerikanisch"],"favorit":true,"portionen":4,"portionenEinheit":"Burger","aufwand":"mittel","zeit":{"vorbereitung":20,"gesamt":40},"zutaten":[{"gruppe":"Patties","items":[{"menge":600,"einheit":"g","name":"Rindshackfleisch (20% Fett)","abteilung":"Fleisch & Fisch"},{"menge":1,"einheit":"TL","name":"Salz","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"TL","name":"Pfeffer","abteilung":"Gewürze & Öle"}]},{"gruppe":"Buns & Belag","items":[{"menge":4,"einheit":"Stück","name":"Brioche Buns","abteilung":"Brot & Backwaren"},{"menge":4,"einheit":"Stück","name":"Cheddar Scheiben","abteilung":"Milchprodukte"},{"menge":1,"einheit":"Stück","name":"Weisse Zwiebel","abteilung":"Gemüse & Früchte"},{"menge":4,"einheit":"Stück","name":"Cornichons (in Scheiben)","abteilung":"Sonstiges"},{"menge":2,"einheit":"EL","name":"American Mustard","abteilung":"Gewürze & Öle"},{"menge":2,"einheit":"EL","name":"Ketchup","abteilung":"Gewürze & Öle"},{"menge":1,"einheit":"EL","name":"Butter (für Buns)","abteilung":"Milchprodukte"}]}],"schritte":["Hackfleisch von Hand in 8 gleichmässige Bällchen (ca. 75 g) formen — locker formen, nicht zusammenpressen. NICHT würzen, das wird sonst wurstig.","Outdoorchef Plancha oder Gusseisenpfanne auf höchste Stufe erhitzen — mind. 5 Min. vorheizen, muss richtig heiss sein. Test: Wassertropfen tanzt und verdampft sofort.","Zwiebel mit dem Messer in hauchdünne Ringe schneiden (Mandoline ist auch gut).","Fleischbällchen auf die glühende Platte legen, sofort mit Salz und Pfeffer würzen.","Mit einem breiten Spachtel oder Burger-Press flach drücken — richtig fest pressen, der Smash! Patties sollen ca. 1 cm dick sein, Ränder ausgefranst. Nicht mehr bewegen.","Ca. 2 Min. braten — fertig wenn die Unterseite eine dunkelbraune, krustige Kruste hat (vom Rand her sichtbar).","Mit dem Spachtel kräftig vom Boden lösen (Kruste soll mitkommen, nicht kleben bleiben), wenden. Sofort eine Cheddar-Scheibe pro Patty drauflegen. Weitere 1-2 Min. braten — Käse soll schmelzen.","Brioche Buns aufschneiden, Innenseiten auf der Plancha 30 Sek. golden toasten.","Buns mit Mustard und Ketchup bestreichen, je 2 Patties stapeln (Käseseite oben), Zwiebelringe und Cornichons drauf.","Sofort servieren — Smashed Burger sind ein Hot-and-Now-Gericht."],"tipps":["Das Fleisch NICHT vorwürzen — Salz erst beim Smash, sonst wird die Textur wurstig.","Je heisser die Platte, desto besser die Maillard-Kruste.","Dünne Patties = maximale Kruste-zu-Fleisch-Ratio. Das ist der Punkt.","Selbstgemachte Brioche Buns (siehe separates Rezept) machen den Unterschied."],"notizen":"Am besten auf der Outdoorchef Plancha. Funktioniert aber auch in der Gusseisenpfanne drinnen."},{"id":"tiramisu-im-glas","titel":"Tiramisu im Glas","kategorie":"Dessert","tags":["italienisch","dessert","im-glas","klassiker","make-ahead","leicht"],"favorit":false,"portionen":4,"portionenEinheit":"Gläser","aufwand":"einfach","zeit":{"vorbereitung":25,"gesamt":265},"zutaten":[{"gruppe":"Creme","items":[{"menge":250,"einheit":"g","name":"Mascarpone (Zimmertemperatur)","abteilung":"Milchprodukte"},{"menge":2,"einheit":"Stück","name":"Eier (sehr frisch)","abteilung":"Milchprodukte"},{"menge":60,"einheit":"g","name":"Zucker","abteilung":"Grundnahrungsmittel"},{"menge":1,"einheit":"dl","name":"Vollrahm (kalt)","abteilung":"Milchprodukte"},{"menge":1,"einheit":"Prise","name":"Salz","abteilung":"Gewürze & Öle"},{"menge":0.5,"einheit":"TL","name":"Vanillepaste","abteilung":"Gewürze & Öle"}]},{"gruppe":"Tränke","items":[{"menge":2,"einheit":"dl","name":"Espresso (stark, abgekühlt)","abteilung":"Grundnahrungsmittel"},{"menge":2,"einheit":"EL","name":"Amaretto","abteilung":"Getränke"},{"menge":1,"einheit":"TL","name":"Zucker","abteilung":"Grundnahrungsmittel"}]},{"gruppe":"Schichten & Topping","items":[{"menge":16,"einheit":"Stück","name":"Löffelbiskuits","abteilung":"Brot & Backwaren"},{"menge":2,"einheit":"EL","name":"Kakaopulver (ungesüsst)","abteilung":"Grundnahrungsmittel"}]}],"schritte":["Espresso, 1 TL Zucker und Amaretto verrühren bis der Zucker gelöst ist. In eine flache Schale giessen und vollständig auskühlen lassen. Wichtig: muss kalt sein, sonst werden die Biskuits matschig.","Vollrahm mit dem Handmixer halbsteif schlagen, bis weiche, leicht überhängende Spitzen entstehen (Joghurt-Konsistenz mit Halt). Nicht steif schlagen. Kühl stellen.","Eigelb, 40 g Zucker, Vanillepaste und eine Prise Salz in der Bosch Küchenmaschine mit Schwingbesen 4-5 Min auf hoher Stufe hell aufschlagen. Fertig wenn die Masse fast weiss und dickflüssig ist und als Band vom Besen fällt (Bandprobe).","Mascarpone von Hand mit dem Spatel esslöffelweise unter die Eigelbmasse rühren, nur bis homogen und glatt. Nicht überrühren — sonst wird die Masse flüssig.","Geschlagenen Rahm in zwei Portionen mit dem Spatel sanft unterheben. Endmasse: gleichmässig hellgelb, keine weissen Rahmstreifen mehr.","Schüssel und Schwingbesen heiss ausspülen und mit Küchenpapier komplett trocken reiben. Auch kleinste Fettreste verhindern stabilen Eischnee.","Eiweiss mit einer Prise Salz in der Bosch Küchenmaschine mit Schwingbesen auf mittlerer Stufe schaumig schlagen. Sobald schaumig, die 20 g Zucker langsam einrieseln lassen, dann höher schalten. Insgesamt 3-4 Min. Fertig: glänzend, mittelfest, Spitzen überhängen leicht — beim Kippen der Schüssel rutscht nichts. Nicht zu fest schlagen, sonst lässt sich der Schnee nicht mehr unterheben.","Eischnee in zwei Etappen unter die Mascarpone-Creme heben: erst ein Drittel mit Schwung einrühren (lockert die Masse), dann den Rest mit dem Spatel sanft falten — von unten durch die Mitte, an den Rand, drüber. Fertig: luftig-cremig, keine weissen Schaumstückchen mehr sichtbar.","Löffelbiskuits einzeln 1-2 Sek pro Seite in den Espresso tunken — feucht, aber nicht durchnässt (sie sollen noch Form haben). In 2-3 Stücke brechen.","Pro Bodum-Glas schichten: 2 Biskuits am Boden, ca. 2-3 EL Creme, 2 Biskuits, restliche Creme darauf. Oberfläche glatt streichen, ca. 1 cm Rand frei lassen. Tipp: Gefrierbeutel mit abgeschnittener Ecke gibt saubere Schichten am Glasrand.","Mindestens 4 h, besser über Nacht im Kühlschrank ziehen lassen. Mit Frischhaltefolie locker abdecken — nicht direkt auf die Creme drücken.","Vor dem Servieren Kakao durch ein feines Sieb grosszügig drüberstäuben. Optional Schokoraspel."],"tipps":["Eier sehr frisch, da das Eiweiss roh bleibt — Bio-Eier nehmen, im Kühlschrank lagern.","Über Nacht ziehen lassen ist klar besser als nur 4 h — die Aromen ziehen durch und die Creme stabilisiert sich.","Kakao erst direkt vor dem Servieren auf die Oberfläche, sonst saugt er Feuchtigkeit und wird fleckig.","Ohne Alkohol: Amaretto weglassen und dafür ½ TL Vanillepaste mehr in die Tränke geben."],"notizen":"Im Bodum-Glas geschichtet — leicht und luftig durch geschlagenes Eiweiss und etwas Rahm. Klassisch im Geschmack, aber nicht so schwer wie das traditionelle Original."}];

// State
let currentView = 'rezepte';
let currentFilter = 'alle';
let searchQuery = '';
let einkaufRezepte = []; // [{id, portionen}]
let detailPortionen = {};

// Bug 1 Fix: HTML escaping to prevent XSS
function esc(str) {
  const el = document.createElement('span');
  el.textContent = str;
  return el.innerHTML;
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  renderRezepte();
  bindEvents();
});

function bindEvents() {
  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      switchView(tab.dataset.view);
    });
  });

  // Filters
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderRezepte();
    });
  });

  // Search
  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase().trim();
    renderRezepte();
  });

  // Menu generator
  document.getElementById('menu-generate').addEventListener('click', generateMenu);
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  document.querySelector('.filters').classList.toggle('hidden', view !== 'rezepte');

  if (view === 'rezepte') {
    document.getElementById('view-rezepte').classList.remove('hidden');
    renderRezepte();
  } else if (view === 'einkauf') {
    document.getElementById('view-einkauf').classList.remove('hidden');
    renderEinkaufsliste();
  } else if (view === 'menu') {
    document.getElementById('view-menu').classList.remove('hidden');
  }
}

function filterRezepte() {
  return REZEPTE.filter(r => {
    // Filter
    if (currentFilter === 'favorit' && !r.favorit) return false;
    if (currentFilter !== 'alle' && currentFilter !== 'favorit' && r.kategorie !== currentFilter) return false;

    // Search
    if (searchQuery) {
      const haystack = [
        r.titel,
        r.kategorie,
        ...r.tags,
        ...r.zutaten.flatMap(g => g.items.map(i => i.name)),
        r.notizen || ''
      ].join(' ').toLowerCase();
      return haystack.includes(searchQuery);
    }
    return true;
  });
}

function renderRezepte() {
  const filtered = filterRezepte();
  const container = document.getElementById('rezepte-list');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>Keine Rezepte gefunden.</p></div>';
    return;
  }

  container.innerHTML = filtered.map(r => {
    const zeit = r.zeit.gesamt >= 60
      ? Math.floor(r.zeit.gesamt / 60) + ' Std.' + (r.zeit.gesamt % 60 > 0 ? ' ' + r.zeit.gesamt % 60 + ' Min.' : '')
      : r.zeit.gesamt + ' Min.';
    return `
    <div class="card" onclick="showDetail('${esc(r.id)}')">
      ${r.favorit ? '<span class="star">\u2605</span>' : ''}
      <div class="card-title">${esc(r.titel)}</div>
      <div class="card-meta">
        <span>${esc(r.kategorie)}</span>
        <span>${zeit}</span>
        <span>${esc(r.aufwand)}</span>
        <span>${r.portionen} ${esc(r.portionenEinheit || 'Port.')}</span>
      </div>
      <div class="card-tags">${r.tags.map(t => '<span class="tag">' + esc(t) + '</span>').join('')}</div>
    </div>`;
  }).join('');
}

function showDetail(id) {
  const r = REZEPTE.find(x => x.id === id);
  if (!r) return;

  const portionen = detailPortionen[id] || r.portionen;
  const faktor = portionen / r.portionen;

  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  document.querySelector('.filters').classList.add('hidden');
  document.getElementById('view-detail').classList.remove('hidden');

  const inEinkauf = einkaufRezepte.some(e => e.id === id);

  document.getElementById('detail-content').innerHTML = `
    <button class="detail-back" onclick="backToList()">\u2190 Zur\u00fcck</button>
    <div class="detail-title">${r.favorit ? '\u2605 ' : ''}${esc(r.titel)}</div>
    <div class="detail-meta">
      <span>${esc(r.kategorie)}</span>
      <span>${esc(r.aufwand)}</span>
      <span>Vorb. ${r.zeit.vorbereitung} Min.</span>
      <span>Gesamt ${formatZeit(r.zeit.gesamt)}</span>
    </div>

    <div class="portionen-control">
      <span>${esc(r.portionenEinheit || 'Portionen')}:</span>
      <button onclick="adjustPortionen('${esc(id)}', -1)">\u2212</button>
      <span id="port-display">${portionen}</span>
      <button onclick="adjustPortionen('${esc(id)}', 1)">+</button>
    </div>

    <div class="detail-actions">
      <button class="btn primary" onclick="toggleEinkauf('${esc(id)}', ${portionen})">
        ${inEinkauf ? '\u2713 In Einkaufsliste' : '\u2795 Zur Einkaufsliste'}
      </button>
    </div>

    <div class="section-title">Zutaten</div>
    ${r.zutaten.map(g => `
      <div class="zutat-gruppe">
        ${g.gruppe ? '<div class="zutat-gruppe-name">' + esc(g.gruppe) + '</div>' : ''}
        ${g.items.map(i => `
          <div class="zutat-item">
            <span>${esc(i.name)}</span>
            <span class="zutat-menge">${formatMenge(i.menge * faktor, i.einheit)}</span>
          </div>
        `).join('')}
      </div>
    `).join('')}

    <div class="section-title">Zubereitung</div>
    ${r.schritte.map((s, i) => `
      <div class="schritt">
        <span class="schritt-num">${i + 1}</span>
        <span>${esc(s)}</span>
      </div>
    `).join('')}

    ${r.tipps && r.tipps.length ? `
      <div class="section-title">Tipps</div>
      ${r.tipps.map(t => '<div class="tipp">' + esc(t) + '</div>').join('')}
    ` : ''}

    ${r.notizen ? '<div class="notiz-box">' + esc(r.notizen) + '</div>' : ''}
  `;

  window.scrollTo(0, 0);
}

function backToList() {
  document.getElementById('view-detail').classList.add('hidden');
  document.getElementById('view-rezepte').classList.remove('hidden');
  document.querySelector('.filters').classList.remove('hidden');
}

function adjustPortionen(id, delta) {
  const r = REZEPTE.find(x => x.id === id);
  const current = detailPortionen[id] || r.portionen;
  const next = Math.max(1, current + delta);
  detailPortionen[id] = next;
  showDetail(id);
}

function toggleEinkauf(id, portionen) {
  const idx = einkaufRezepte.findIndex(e => e.id === id);
  if (idx >= 0) {
    einkaufRezepte.splice(idx, 1);
  } else {
    einkaufRezepte.push({ id, portionen });
  }
  showDetail(id);
  updateEinkaufBadge();
}

function updateEinkaufBadge() {
  document.getElementById('einkauf-count').textContent = einkaufRezepte.length;
}

function renderEinkaufsliste() {
  const selectedEl = document.getElementById('einkauf-selected');
  const listeEl = document.getElementById('einkauf-liste');
  const emptyEl = document.getElementById('einkauf-empty');

  if (einkaufRezepte.length === 0) {
    selectedEl.innerHTML = '';
    listeEl.innerHTML = '';
    emptyEl.classList.remove('hidden');
    return;
  }

  emptyEl.classList.add('hidden');

  // Selected chips
  selectedEl.innerHTML = einkaufRezepte.map(e => {
    const r = REZEPTE.find(x => x.id === e.id);
    return `<div class="selected-chip">
      ${esc(r.titel)} (\u00d7${e.portionen})
      <span class="remove" onclick="removeEinkauf('${esc(e.id)}')">&times;</span>
    </div>`;
  }).join('');

  // Merge ingredients
  // Bug 3 Fix: Normalize name by stripping parenthetical suffixes for merge key
  function mergeKey(name, einheit) {
    return name.toLowerCase().replace(/\s*\(.*\)\s*/g, '').trim() + '|' + einheit;
  }

  const merged = {};
  einkaufRezepte.forEach(e => {
    const r = REZEPTE.find(x => x.id === e.id);
    const faktor = e.portionen / r.portionen;
    r.zutaten.forEach(g => {
      g.items.forEach(item => {
        const key = mergeKey(item.name, item.einheit);
        if (merged[key]) {
          merged[key].menge += item.menge * faktor;
        } else {
          merged[key] = {
            name: item.name.replace(/\s*\(.*\)\s*/g, '').trim(),
            menge: item.menge * faktor,
            einheit: item.einheit,
            abteilung: item.abteilung
          };
        }
      });
    });
  });

  // Group by Abteilung
  const byAbt = {};
  Object.values(merged).forEach(item => {
    const abt = item.abteilung || 'Sonstiges';
    if (!byAbt[abt]) byAbt[abt] = [];
    byAbt[abt].push(item);
  });

  const abtOrder = ['Gemüse & Früchte', 'Milchprodukte', 'Fleisch & Fisch', 'Brot & Backwaren', 'Grundnahrungsmittel', 'Gewürze & Öle', 'Tiefkühl', 'Getränke', 'Sonstiges'];

  listeEl.innerHTML = abtOrder
    .filter(a => byAbt[a])
    .map(abt => `
      <div class="abteilung-group">
        <div class="abteilung-title">${abt}</div>
        ${byAbt[abt].map((item, i) => `
          <label class="einkauf-item" id="ei-${i}">
            <input type="checkbox" onchange="this.parentElement.classList.toggle('checked')">
            <span>${formatMenge(item.menge, item.einheit)} ${esc(item.name)}</span>
          </label>
        `).join('')}
      </div>
    `).join('');
}

function removeEinkauf(id) {
  einkaufRezepte = einkaufRezepte.filter(e => e.id !== id);
  updateEinkaufBadge();
  renderEinkaufsliste();
}

function generateMenu() {
  let personen = parseInt(document.getElementById('menu-personen').value) || 4;
  // Bug 7 Fix: Clamp to valid range
  if (personen < 1) personen = 1;
  if (personen > 20) personen = 20;
  document.getElementById('menu-personen').value = personen;
  const resultEl = document.getElementById('menu-result');

  const vorspeisen = REZEPTE.filter(r => r.kategorie === 'Vorspeise');
  const hauptgaenge = REZEPTE.filter(r => r.kategorie === 'Hauptgang');
  const beilagen = REZEPTE.filter(r => r.kategorie === 'Beilage');
  const desserts = REZEPTE.filter(r => r.kategorie === 'Dessert');
  const saucen = REZEPTE.filter(r => r.kategorie === 'Sauce & Dip');

  const pick = arr => arr.length ? arr[Math.floor(Math.random() * arr.length)] : null;

  const menu = [
    { gang: 'Vorspeise', rezept: pick(vorspeisen) },
    { gang: 'Hauptgang', rezept: pick(hauptgaenge) },
    { gang: 'Beilage', rezept: pick(beilagen) },
    { gang: 'Sauce', rezept: pick(saucen) },
    { gang: 'Dessert', rezept: pick(desserts) }
  ].filter(m => m.rezept);

  if (menu.length === 0) {
    resultEl.innerHTML = '<div class="empty-state">Zu wenig Rezepte für ein Menü.</div>';
    return;
  }

  resultEl.innerHTML = `
    <p style="color:var(--text-light); margin-top:1rem; font-size:0.85rem">Vorschlag f\u00fcr ${personen} Personen:</p>
    ${menu.map(m => `
      <div class="menu-gang" onclick="showDetail('${esc(m.rezept.id)}')">
        <div class="menu-gang-title">${esc(m.gang)}</div>
        <div class="menu-gang-name">${esc(m.rezept.titel)}</div>
      </div>
    `).join('')}
    <div style="margin-top:1rem; display:flex; gap:0.5rem; flex-wrap:wrap">
      <button class="btn primary" onclick="addMenuToEinkauf(${personen})">Alles zur Einkaufsliste</button>
      <button class="btn" onclick="generateMenu()">Nochmal w\u00fcrfeln</button>
    </div>
  `;

  // Store current menu for einkauf
  window._currentMenu = menu.map(m => m.rezept.id);
}

function addMenuToEinkauf(personen) {
  if (!window._currentMenu) return;
  window._currentMenu.forEach(id => {
    if (!einkaufRezepte.some(e => e.id === id)) {
      einkaufRezepte.push({ id, portionen: personen });
    }
  });
  updateEinkaufBadge();
  // Switch to einkauf view
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab')[1].classList.add('active');
  switchView('einkauf');
}

function formatMenge(menge, einheit) {
  if (!menge || menge <= 0) return '';

  // Bug 2 Fix: Auto-convert to larger units
  if (einheit === 'g' && menge >= 1000) {
    menge = menge / 1000;
    einheit = 'kg';
  } else if (einheit === 'ml' && menge >= 1000) {
    menge = menge / 1000;
    einheit = 'l';
  } else if (einheit === 'ml' && menge >= 100) {
    menge = menge / 100;
    einheit = 'dl';
  }

  // Smart rounding
  let display;
  if (menge >= 100) display = Math.round(menge);
  else if (menge >= 10) display = Math.round(menge * 10) / 10;
  else display = Math.round(menge * 100) / 100;

  // Remove trailing zeros
  display = parseFloat(display);

  return display + ' ' + einheit;
}

function formatZeit(min) {
  if (min >= 60) {
    const h = Math.floor(min / 60);
    const m = min % 60;
    return h + ' Std.' + (m > 0 ? ' ' + m + ' Min.' : '');
  }
  return min + ' Min.';
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then((reg) => console.log('[PWA] Service Worker registriert:', reg.scope))
      .catch((err) => console.error('[PWA] SW Registrierung fehlgeschlagen:', err));
  });
}
